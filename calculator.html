<!DOCTYPE html>
<html>
<head>
<title>Umexim Cloud Calculator</title>

<style>
body{
font-family:Arial;
text-align:center;
margin-top:80px;
}

input,select,button{
padding:10px;
margin:5px;
font-size:16px;
}

#result{
margin-top:20px;
font-size:22px;
font-weight:bold;
}
</style>

</head>

<body>

<h2>Umexim Cloud Calculator</h2>

<input id="a" type="number" placeholder="Number A">

<select id="op">
<option value="add">+</option>
<option value="sub">-</option>
<option value="mul">*</option>
<option value="div">/</option>
</select>

<input id="b" type="number" placeholder="Number B">

<br>

<button onclick="calculate()">Calculate</button>

<div id="result"></div>

<script>

async function calculate(){

const a = parseFloat(document.getElementById("a").value);
const b = parseFloat(document.getElementById("b").value);
const op = document.getElementById("op").value;

const res = await fetch("https://api.umexim.com/api/calc",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({a:a,b:b,op:op})
});

const data = await res.json();

document.getElementById("result").innerText = "Result: " + data.result;

}

</script>

</body>
</html>
