<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UMEXIM</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Share+Tech+Mono&family=Dancing+Script&family=Caveat&family=Architects+Daughter&family=Reenie+Beanie&display=swap" rel="stylesheet">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background-color: #000;
      overflow: hidden;
      font-family: 'Share Tech Mono', monospace;
    }

    .bg-sketch {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('https://upload.wikimedia.org/wikipedia/commons/thumb/e/e9/Vitruvian_Man_by_Leonardo_da_Vinci.jpg/800px-Vitruvian_Man_by_Leonardo_da_Vinci.jpg') no-repeat center center;
      background-size: contain;
      opacity: 0.02;
      z-index: 0;
      pointer-events: none;
    }

    .center-logo {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Playfair Display', serif;
      font-size: 2.8rem;
      text-align: center;
      color: rgba(0, 255, 136, 0.95);
      text-shadow: 0 0 8px #00ff88, 0 0 16px #00ff88;
      z-index: 100;
      pointer-events: none;
    }

    .center-logo .sub {
      font-size: 1.2rem;
      font-family: 'Share Tech Mono', monospace;
      color: rgba(0,255,136,0.6);
      letter-spacing: 2px;
    }

    .center-logo .designer-tag {
      font-size: 0.65rem;
      margin-top: 14px;
      color: rgba(0, 255, 136, 0.3);
      font-family: 'Playfair Display', serif;
      text-transform: lowercase;
      letter-spacing: 1px;
    }

    /* NEW: bottom center project link */
    .project-link {
      position: absolute;
      bottom: 26px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 250;
      padding: 10px 18px;
      border: 1px solid rgba(0, 255, 136, 0.45);
      border-radius: 10px;
      color: rgba(0, 255, 136, 0.9);
      text-decoration: none;
      font-size: 14px;
      letter-spacing: 1px;
      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(2px);
      transition: all 0.25s ease;
    }

    .project-link:hover {
      border-color: rgba(0, 255, 136, 0.95);
      box-shadow: 0 0 10px rgba(0, 255, 136, 0.35);
      color: rgba(0, 255, 136, 1);
      transform: translateX(-50%) translateY(-2px);
    }

    .rain-line {
      position: absolute;
      top: -100px;
      font-size: 14px;
      line-height: 1.4;
      color: #00ff00;
      font-family: monospace;
      white-space: pre;
      animation: drop 5s linear infinite;
      z-index: 10;
      pointer-events: none;
    }

    @keyframes drop {
      to {
        transform: translateY(120vh);
      }
    }

    .formula {
      position: absolute;
      font-size: 14px;
      opacity: 0.7;
      pointer-events: none;
      z-index: 5;
      animation: fadein 2s ease-out;
    }

    @keyframes fadein {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 0.7; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="bg-sketch"></div>

  <div class="center-logo">
    UMEXIM<br/>
    <span class="sub">London</span>
    <div class="designer-tag">usaodatov design</div>
  </div>

  <!-- NEW: clickable project link -->
  <a class="project-link" href="calculator.html">Project: Calculator</a>

  <script>
    const formulas = [
      "f(x) = σ(Wx + b)", "E = mc²", "L = -∑[y log(ŷ) + (1-y)log(1-ŷ)]",
      "A = XᵀX", "∇f(x) = ∂f/∂x", "ŷ = softmax(Wx + b)",
      "∫ f(x) dx", "W = W - α∇L(W)", "z = (x - μ)/σ",
      "P(A|B) = P(B|A)P(A)/P(B)", "torch.nn.Linear(64, 10)",
      "model = tf.keras.Sequential()", "np.dot(X, W) + b",
      "sklearn.metrics.accuracy_score(y, ŷ)"
    ];

    const handwritingFonts = [
      "'Dancing Script', cursive",
      "'Caveat', cursive",
      "'Architects Daughter', cursive",
      "'Reenie Beanie', cursive"
    ];

    const centerX = window.innerWidth / 2;
    const centerY = window.innerHeight / 2;
    const avoidRadius = 140;

    function isInProtectedZone(x, y) {
      const dx = x - centerX;
      const dy = y - centerY;
      return Math.sqrt(dx * dx + dy * dy) < avoidRadius;
    }

    function getSafePosition() {
      let x, y, tries = 0;
      do {
        x = Math.random() * window.innerWidth;
        y = Math.random() * window.innerHeight;
        tries++;
      } while (isInProtectedZone(x, y) && tries < 20);
      return { x, y };
    }

    function createFormula() {
      const formula = formulas[Math.floor(Math.random() * formulas.length)];
      const { x, y } = getSafePosition();
      const div = document.createElement("div");
      div.className = "formula";
      div.textContent = formula;
      div.style.left = x + "px";
      div.style.top = y + "px";
      div.style.fontFamily = handwritingFonts[Math.floor(Math.random() * handwritingFonts.length)];
      div.style.color = "#00ff88";
      div.style.textShadow = "0 0 4px #00ff88, 0 0 8px #00ff88";
      document.body.appendChild(div);
      setTimeout(() => div.remove(), 16000);
    }

    function createMatrixRainLine() {
      const column = Math.random() * window.innerWidth;
      const characters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
      let text = '';
      const length = Math.floor(Math.random() * 12) + 5;
      for (let i = 0; i < length; i++) {
        text += characters.charAt(Math.floor(Math.random() * characters.length)) + "\n";
      }
      const div = document.createElement("div");
      div.className = "rain-line";
      div.textContent = text;
      div.style.left = column + "px";
      document.body.appendChild(div);
      setTimeout(() => div.remove(), 7000);
    }

    setInterval(createMatrixRainLine, 120);
    setInterval(createFormula, 1400);
  </script>
</body>
</html>
